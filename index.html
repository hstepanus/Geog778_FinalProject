<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NOVEC Predictive Grid — Peer Testing Mockup</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --brand:#0b3d91;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
}
body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --line:#334155;
}
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  background:var(--brand);
  color:#fff;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.wrap{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:12px;
  padding:12px;
}
.panel{
  background:var(--card);
  border-radius:12px;
  padding:14px;
  border:1px solid var(--line);
  height:85vh;
  overflow:auto;
}
button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
}
.primary{ background:var(--brand); color:#fff; }
.secondary{ background:#64748b; color:#fff; }
.toggleDark{
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
}
#map{
  height:85vh;
  border-radius:12px;
}
.legend{
  position:absolute;
  top:12px;
  right:12px;
  background:var(--card);
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:12px;
  z-index:999;
}
.legend b{ display:block; margin-bottom:6px; }
.legend-item{
  display:flex;
  align-items:center;
  margin-bottom:4px;
}
.swatch{
  width:14px;
  height:14px;
  margin-right:6px;
  border-radius:3px;
}
@media(max-width:900px){
  .wrap{ grid-template-columns:1fr; }
  #map{ height:500px; }
}
</style>
</head>

<body>

<header>
  <strong>NOVEC Predictive Grid — Peer Testing Mockup</strong>
  <div class="toggleDark" onclick="toggleDark()">Toggle Dark Mode</div>
</header>

<div class="wrap">

  <div class="panel">
    <h3>Spatial Layers</h3>

    <button class="primary" onclick="showLayer('heatmap')">EV Heatmap</button>
    <button class="primary" onclick="showLayer('solar')">Solar Density</button>
    <button class="primary" onclick="showLayer('hotspot')">Gi* Hotspots</button>
    <button class="primary" onclick="showLayer('lisa')">LISA Clusters</button>

    <h3 style="margin-top:20px;">Testing</h3>
    <button class="secondary" onclick="zoomZip()">Zoom to ZIP 22192</button>

    <p style="font-size:12px;color:var(--muted);margin-top:14px;">
      * Spatial layers are simulated for UX testing.  
      Final implementation will connect to PostGIS.
    </p>
  </div>

  <div style="position:relative;">
    <div id="map"></div>
    <div class="legend" id="legend">
      <b>Legend</b>
      Select a layer.
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

function toggleDark(){
  document.body.classList.toggle("dark");
}

var map = L.map('map').setView([38.75, -77.45], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap'
}).addTo(map);

var legend = document.getElementById("legend");

function updateLegend(html){
  legend.innerHTML = "<b>Legend</b>" + html;
}

var activeLayer;

// --- Simulated EV Heatmap ---
var heatData = [
  [38.72, -77.35, 0.8],
  [38.75, -77.40, 0.9],
  [38.78, -77.33, 0.7],
  [38.85, -77.50, 0.6],
  [38.82, -77.45, 0.85]
];

var heatLayer = L.heatLayer(heatData, {
  radius:35,
  blur:25,
  maxZoom:12
});

// --- ZIP Polygons with Hover ---
function style(color){
  return {color:color, fillColor:color, fillOpacity:0.4, weight:2};
}
function highlight(e){
  e.target.setStyle({weight:4, fillOpacity:0.6});
}
function reset(e){
  e.target.setStyle({weight:2, fillOpacity:0.4});
}

var zip = L.polygon([
  [38.62,-77.43],
  [38.67,-77.43],
  [38.67,-77.30],
  [38.62,-77.30]
], style("#ef4444"))
.on("mouseover",highlight)
.on("mouseout",reset)
.bindPopup("<b>ZIP 22192</b><br>High EV adoption growth");

// --- Solar Layer ---
var solarLayer = L.polygon([
  [38.80,-77.60],
  [38.86,-77.60],
  [38.86,-77.50],
  [38.80,-77.50]
], style("#f59e0b")).bindPopup("Solar adoption cluster");

// --- Animated Hotspots ---
var hotspotLayer = L.layerGroup([
  L.circle([38.72,-77.35], {radius:5000,color:"#2563eb",fillOpacity:0.3}),
  L.circle([38.85,-77.50], {radius:6000,color:"#2563eb",fillOpacity:0.3})
]);

// --- LISA Layer ---
var lisaLayer = L.polygon([
  [38.83,-77.42],
  [38.90,-77.42],
  [38.90,-77.25],
  [38.83,-77.25]
], style("#10b981")).bindPopup("High-High Cluster");

function clearLayer(){
  if(activeLayer){
    map.removeLayer(activeLayer);
  }
}

function showLayer(type){
  clearLayer();

  if(type==="heatmap"){
    activeLayer = heatLayer.addTo(map);
    updateLegend(`
      <div class="legend-item"><div class="swatch" style="background:red"></div>High EV density</div>
      <div class="legend-item"><div class="swatch" style="background:yellow"></div>Moderate EV density</div>
      <div class="legend-item"><div class="swatch" style="background:blue"></div>Low EV density</div>
    `);
  }

  if(type==="solar"){
    activeLayer = solarLayer.addTo(map);
    updateLegend(`
      <div class="legend-item"><div class="swatch" style="background:#f59e0b"></div>Solar cluster</div>
    `);
  }

  if(type==="hotspot"){
    activeLayer = hotspotLayer.addTo(map);
    updateLegend(`
      <div class="legend-item"><div class="swatch" style="background:#2563eb"></div>Statistically significant hotspot</div>
    `);
  }

  if(type==="lisa"){
    activeLayer = lisaLayer.addTo(map);
    updateLegend(`
      <div class="legend-item"><div class="swatch" style="background:#10b981"></div>High-High LISA cluster</div>
    `);
  }
}

function zoomZip(){
  zip.addTo(map).openPopup();
  map.fitBounds(zip.getBounds());
}

</script>

</body>
</html>
